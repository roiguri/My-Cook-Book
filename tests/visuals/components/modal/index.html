<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modal Visual Test</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background-color: #f4f4f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <custom-modal id="test-modal">
      <h2 slot="header">Test Modal</h2>
      <div slot="content">
        <p>This is a test modal content.</p>
        <button id="inside-btn">Action</button>
      </div>
      <div slot="footer">
        <button id="close-btn">Close</button>
      </div>
    </custom-modal>
    <script type="module" src="/src/lib/utilities/modal/modal.js"></script>
    <script>
      const modal = document.getElementById('test-modal');
      // Add content dynamically if needed, but slots work best
      modal.innerHTML = `
            <h2>Test Modal Header</h2>
            <p>This is a test modal content.</p>
            <button id="action-btn">Action</button>
        `;
    </script>
  </body>
</html>
