    <title>Modal Visual Test</title>
    <link rel="stylesheet" href="/src/styles/base.css">
    <style>
      body {
        /* Override base styles for test isolation if needed, but keeping consistent is better */

        height: 100vh;

            <button id="close-btn" onclick="document.getElementById('test-modal').close()">Close</button>

    </custom-modal>
    <script type="module" src="/src/lib/utilities/modal/modal.js"></script>
