<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>%VITE_APP_TITLE%</title>

    <!-- Preconnect to external origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- PWA theme color -->
    <meta name="theme-color" content="#6a994e" />

    <!-- Favicon for browsers -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="img/icon/%VITE_ICON_PATH%/wooden-spoon-32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="img/icon/%VITE_ICON_PATH%/wooden-spoon-16.png"
    />

    <!-- Icon for Android Chrome -->
    <link rel="manifest" href="/%VITE_MANIFEST_FILE%" />

    <!-- Icon for iOS -->
    <link
      rel="apple-touch-icon"
      sizes="128x128"
      href="img/icon/%VITE_ICON_PATH%/wooden-spoon-128.png"
    />

    <!-- SPA Entry Point -->
    <script type="module" src="/src/app.js" defer></script>
  </head>
  <body class="spa-app">
    <!-- Application Header -->
    <header class="header-container app-loading">
      <div class="menu-title-container">
        <button class="nav-toggle" aria-label="Toggle navigation">
          <span class="hamburger"></span>
        </button>
        <a href="/home">
          <div class="logo">Our Kitchen <em>Chronicles</em></div>
        </a>
      </div>
      <div class="nav-search-container">
        <nav dir="rtl">
          <ul>
            <li><a href="/home">דף הבית</a></li>
            <li><a href="/categories">מתכונים</a></li>
            <li><a href="/propose-recipe">הצעת מתכון</a></li>
          </ul>
        </nav>
        <div class="search-auth-container">
          <div class="search-bar header-search">
            <header-search-bar></header-search-bar>
          </div>
          <auth-avatar></auth-avatar>
        </div>
      </div>
    </header>

    <!-- SPA Content Container -->
    <main id="spa-content" class="spa-content">
      <div class="page-loading">
        <div class="page-loading-spinner"></div>
      </div>
    </main>

    <!-- Application Footer -->
    <footer>
      <p>&copy; 2024 Our Kitchen Chronicles. All rights reserved.</p>
      <a id="icon-attribute" href="https://www.flaticon.com/free-icons/spoon" title="spoon icons"
        >Spoon icons created by Freepik - Flaticon</a
      >
    </footer>

    <!-- Auth Components -->
    <auth-controller>
      <auth-content>
        <login-form slot="login-form" class="active"></login-form>
        <signup-form slot="signup-form"></signup-form>
        <forgot-password slot="forgot-password"></forgot-password>
        <user-profile slot="user-profile"></user-profile>
      </auth-content>
    </auth-controller>
  </body>
</html>
