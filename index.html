<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Kitchen Chronicles</title>

    <!-- Styles -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
    />

    <!-- Favicon for browsers -->
    <link rel="icon" type="image/png" sizes="32x32" href="img/icon/wooden-spoon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="img/icon/wooden-spoon-16.png" />

    <!-- Icon for Android Chrome -->
    <link rel="manifest" href="/site.webmanifest.json" />

    <!-- Icon for iOS -->
    <link rel="apple-touch-icon" sizes="128x128" href="img/icon/wooden-spoon-16.png" />

    <script type="module" src="/src/pages/index.js" defer></script>
  </head>
  <body class="home-page">
    <script>
      async function loadPage() {
        try {
          // Fetch and inject skeleton.html
          const skeletonResponse = await fetch('skeleton.html');
          if (!skeletonResponse.ok) {
            console.error('Failed to load skeleton.html:', skeletonResponse.statusText);
            return;
          }
          const skeletonHTML = await skeletonResponse.text();
          document.body.innerHTML = skeletonHTML;

          // Fetch and inject pages/home.html into div#page-content
          const pageContentDiv = document.getElementById('page-content');
          if (!pageContentDiv) {
            console.error('div#page-content not found in skeleton.html');
            return;
          }
          const homeResponse = await fetch('pages/home.html');
          if (!homeResponse.ok) {
            console.error('Failed to load pages/home.html:', homeResponse.statusText);
            return;
          }
          const homeHTML = await homeResponse.text();
          pageContentDiv.innerHTML = homeHTML;

          // Dispatch a custom event to signal that content is loaded
          document.dispatchEvent(new CustomEvent('pageContentLoaded'));

        } catch (error) {
          console.error('Error loading page content:', error);
        }
      }
      loadPage();
    </script>
  </body>
</html>
