<main class="manager-dashboard">
  <div class="dashboard-header">
    <button class="refresh-icon master-refresh" id="master-refresh" title="רענן הכל">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="currentColor">
        <path
          d="M463.5 224H472c13.3 0 24-10.7 24-24V72c0-9.7-5.8-18.5-14.8-22.2s-19.3-1.7-26.2 5.2L413.4 96.6c-87.6-86.5-228.7-86.2-315.8 1c-87.5 87.5-87.5 229.3 0 316.8s229.3 87.5 316.8 0c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0c-62.5 62.5-163.8 62.5-226.3 0s-62.5-163.8 0-226.3c62.2-62.2 162.7-62.5 225.3-1L327 183c-6.9 6.9-8.9 17.2-5.2 26.2s12.5 14.8 22.2 14.8H463.5z"
        />
      </svg>
    </button>
    <h1 class="heading-1">Manager Dashboard</h1>
  </div>

  <div class="sections">
    <section id="user-management" class="section">
      <div class="section-header">
        <h2>ניהול משתמשים</h2>
        <button
          class="refresh-icon section-refresh"
          data-section="users"
          title="רענן רשימת משתמשים"
        >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="currentColor">
            <path
              d="M463.5 224H472c13.3 0 24-10.7 24-24V72c0-9.7-5.8-18.5-14.8-22.2s-19.3-1.7-26.2 5.2L413.4 96.6c-87.6-86.5-228.7-86.2-315.8 1c-87.5 87.5-87.5 229.3 0 316.8s229.3 87.5 316.8 0c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0c-62.5 62.5-163.8 62.5-226.3 0s-62.5-163.8 0-226.3c62.2-62.2 162.7-62.5 225.3-1L327 183c-6.9 6.9-8.9 17.2-5.2 26.2s12.5 14.8 22.2 14.8H463.5z"
            />
          </svg>
        </button>
      </div>
      <p class="no-pending-message"></p>
      <scrolling-list id="user-list" height="300px" expandable-items="true"></scrolling-list>
    </section>

    <section id="all-recipes" class="section all-recipes">
      <div class="section-header">
        <h2>כל המתכונים</h2>
        <button
          class="refresh-icon section-refresh"
          data-section="all-recipes"
          title="רענן רשימת מתכונים"
        >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="currentColor">
            <path
              d="M463.5 224H472c13.3 0 24-10.7 24-24V72c0-9.7-5.8-18.5-14.8-22.2s-19.3-1.7-26.2 5.2L413.4 96.6c-87.6-86.5-228.7-86.2-315.8 1c-87.5 87.5-87.5 229.3 0 316.8s229.3 87.5 316.8 0c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0c-62.5 62.5-163.8 62.5-226.3 0s-62.5-163.8 0-226.3c62.2-62.2 162.7-62.5 225.3-1L327 183c-6.9 6.9-8.9 17.2-5.2 26.2s12.5 14.8 22.2 14.8H463.5z"
            />
          </svg>
        </button>
      </div>
      <input type="text" id="recipe-search" placeholder="חיפוש מתכונים..." />
      <select id="recipe-filter">
        <option value="">סינון לפי קטגוריה</option>
        <!-- Add categories dynamically -->
      </select>
      <scrolling-list
        id="all-recipes-list"
        height="330px"
        expandable-items="true"
        header-text-color="black"
      ></scrolling-list>
    </section>

    <section id="pending-recipes" class="dashboard-section">
      <div class="section-header">
        <h2>מתכונים ממתינים לאישור</h2>
        <button
          class="refresh-icon section-refresh"
          data-section="pending-recipes"
          title="רענן מתכונים ממתינים"
        >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="currentColor">
            <path
              d="M463.5 224H472c13.3 0 24-10.7 24-24V72c0-9.7-5.8-18.5-14.8-22.2s-19.3-1.7-26.2 5.2L413.4 96.6c-87.6-86.5-228.7-86.2-315.8 1c-87.5 87.5-87.5 229.3 0 316.8s229.3 87.5 316.8 0c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0c-62.5 62.5-163.8 62.5-226.3 0s-62.5-163.8 0-226.3c62.2-62.2 162.7-62.5 225.3-1L327 183c-6.9 6.9-8.9 17.2-5.2 26.2s12.5 14.8 22.2 14.8H463.5z"
            />
          </svg>
        </button>
      </div>
      <p class="no-pending-message"></p>
      <scrolling-list id="pending-recipes-list" height="400px"></scrolling-list>
    </section>

    <section id="pending-images" class="dashboard-section">
      <div class="section-header">
        <h2>תמונות ממתינות לאישור</h2>
        <button
          class="refresh-icon section-refresh"
          data-section="pending-images"
          title="רענן תמונות ממתינות"
        >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="currentColor">
            <path
              d="M463.5 224H472c13.3 0 24-10.7 24-24V72c0-9.7-5.8-18.5-14.8-22.2s-19.3-1.7-26.2 5.2L413.4 96.6c-87.6-86.5-228.7-86.2-315.8 1c-87.5 87.5-87.5 229.3 0 316.8s229.3 87.5 316.8 0c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0c-62.5 62.5-163.8 62.5-226.3 0s-62.5-163.8 0-226.3c62.2-62.2 162.7-62.5 225.3-1L327 183c-6.9 6.9-8.9 17.2-5.2 26.2s12.5 14.8 22.2 14.8H463.5z"
            />
          </svg>
        </button>
      </div>
      <p class="no-pending-message"></p>
      <scrolling-list id="pending-images-list" height="400px"></scrolling-list>
    </section>

    <section id="failed-urls" class="dashboard-section">
      <div class="section-header">
        <h2>כתובות שנכשלו</h2>
        <button
          class="refresh-icon section-refresh"
          data-section="failed-urls"
          title="רענן כתובות שנכשלו"
        >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="currentColor">
            <path
              d="M463.5 224H472c13.3 0 24-10.7 24-24V72c0-9.7-5.8-18.5-14.8-22.2s-19.3-1.7-26.2 5.2L413.4 96.6c-87.6-86.5-228.7-86.2-315.8 1c-87.5 87.5-87.5 229.3 0 316.8s229.3 87.5 316.8 0c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0c-62.5 62.5-163.8 62.5-226.3 0s-62.5-163.8 0-226.3c62.2-62.2 162.7-62.5 225.3-1L327 183c-6.9 6.9-8.9 17.2-5.2 26.2s12.5 14.8 22.2 14.8H463.5z"
            />
          </svg>
        </button>
      </div>
      <p class="no-items-message"></p>
      <scrolling-list id="failed-urls-list" height="400px" expandable-items="true"></scrolling-list>
    </section>
  </div>
</main>

<!-- modals -->
<div class="preview-recipe-container"></div>
<image-approval-multi></image-approval-multi>
<div class="edit-preview-container"></div>
<confirmation-modal id="delete-recipe-confirmation"></confirmation-modal>
<message-modal id="success-message-modal"></message-modal>
<loading-spinner id="dashboard-spinner" overlay></loading-spinner>
