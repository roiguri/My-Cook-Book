<div class="my-meal-page">
  <div class="kitchen-switcher" role="tablist">
    <!-- Tabs will be dynamically inserted here -->
  </div>

  <div class="my-meal-content">
    <div id="recipe-container" class="recipe-container">
      <!-- Active recipe component will be inserted here -->
    </div>
  </div>

  <div class="ingredients-drawer-toggle">
    <button id="toggle-ingredients-btn" class="btn-primary">
      <i class="fas fa-shopping-basket"></i> רשימת מצרכים
    </button>
  </div>

  <div id="ingredients-drawer" class="ingredients-drawer">
    <div class="drawer-header">
      <h2>רשימת מצרכים</h2>
      <div class="header-actions">
        <button id="share-ingredients-btn" class="action-btn hidden" aria-label="Share" title="שתף">
          <i class="fas fa-share-alt"></i>
        </button>
        <button id="copy-ingredients-btn" class="action-btn" aria-label="Copy" title="העתק ללוח">
          <i class="fas fa-copy"></i>
        </button>
        <button id="close-drawer-btn" class="close-btn" aria-label="Close">
          <i class="fas fa-times"></i>
        </button>
      </div>
    </div>
    <div class="drawer-controls">
      <div class="toggle-group">
        <button id="view-all-ingredients" class="toggle-btn active">כל המצרכים</button>
        <button id="view-recipe-ingredients" class="toggle-btn">מתכון נוכחי</button>
      </div>
      <div class="selection-controls">
        <button id="select-all-btn" class="text-btn">בחר הכל</button>
        <span class="separator">|</span>
        <button id="deselect-all-btn" class="text-btn">בטל בחירה</button>
      </div>
    </div>
    <div id="ingredients-list-container" class="ingredients-list-container">
      <!-- Ingredients list will be populated here -->
    </div>
  </div>
  <div id="drawer-backdrop" class="drawer-backdrop"></div>
</div>
