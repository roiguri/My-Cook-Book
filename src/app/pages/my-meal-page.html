<div class="my-meal-page">
  <div class="meal-header">
    <button id="toggle-ingredients-btn" class="btn-ingredients">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.8"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2" />
        <rect x="9" y="3" width="6" height="4" rx="1" />
        <path d="M9 12h6M9 16h4" />
      </svg>
      <span class="btn-label">רשימת מצרכים</span>
    </button>
    <div class="kitchen-switcher" role="tablist">
      <!-- Tabs will be dynamically inserted here -->
    </div>
  </div>

  <div class="my-meal-content">
    <div id="recipe-container" class="recipe-container">
      <!-- Active recipe component will be inserted here -->
    </div>
  </div>

  <div id="ingredients-drawer" class="ingredients-drawer">
    <div class="drawer-header">
      <h2>רשימת מצרכים</h2>
      <div class="header-actions">
        <button id="share-ingredients-btn" class="action-btn hidden" aria-label="Share" title="שתף">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="18" cy="5" r="3" />
            <circle cx="6" cy="12" r="3" />
            <circle cx="18" cy="19" r="3" />
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
          </svg>
        </button>
        <button id="copy-ingredients-btn" class="action-btn" aria-label="Copy" title="העתק ללוח">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" />
          </svg>
        </button>
        <button id="close-drawer-btn" class="close-btn" aria-label="Close">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>
    <div class="drawer-controls">
      <div class="ing-tabs">
        <button id="view-all-ingredients" class="toggle-btn active">כל המצרכים</button>
        <button id="view-recipe-ingredients" class="toggle-btn">מתכון נוכחי</button>
      </div>
      <div class="selection-controls">
        <button id="select-all-btn" class="text-btn">בחר הכל</button>
        <span class="separator">·</span>
        <button id="deselect-all-btn" class="text-btn">בטל בחירה</button>
      </div>
    </div>
    <div id="ingredients-list-container" class="ingredients-list-container">
      <!-- Ingredients list will be populated here -->
    </div>
  </div>
  <div id="drawer-backdrop" class="drawer-backdrop"></div>
</div>
